appId: com.audesys.studio
productName: AUDESYS Studio
artifactName: audesys-studio-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: resources

files:
  - lib/**/*
  - src-gen/**/*
  - resources/**/*
  - package.json
  - "!node_modules/**/*"
  - node_modules/.cache/**/*

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: AUDESYS Studio ${version}
  artifactName: audesys-studio-${version}-macOS-${arch}.dmg
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

win:
  target:
    - nsis
  artifactName: audesys-studio-${version}-win-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico

linux:
  target:
    - AppImage
  category: Development
  artifactName: audesys-studio-${version}-linux-${arch}.AppImage
  maintainer: audesys@example.com


electronDownload:
  mirror: https://github.com/electron/electron/releases/download/
